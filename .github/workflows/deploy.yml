name: Deploy to ECS

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Setup SSH
        env:
          SSH_KEY: ${{ secrets.ECS_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          echo "--- key file head/tail ---"
          head -1 ~/.ssh/id_ed25519
          tail -1 ~/.ssh/id_ed25519
          echo "--- key line count ---"
          wc -l ~/.ssh/id_ed25519
          echo "--- ssh-keyscan ECS ---"
          ssh-keyscan -H 39.102.120.6 >> ~/.ssh/known_hosts
          echo "--- test ssh connection ---"
          ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no -o BatchMode=yes root@39.102.120.6 "echo ok"

      - name: Deploy via rsync
        run: |
          ssh -i ~/.ssh/id_ed25519 root@39.102.120.6 "mkdir -p /var/www/intro_to_me"
          rsync -avz --delete -e "ssh -i ~/.ssh/id_ed25519" dist/ root@39.102.120.6:/var/www/intro_to_me/

      - name: Reload Nginx
        run: |
          ssh -i ~/.ssh/id_ed25519 root@39.102.120.6 "nginx -t && nginx -s reload"
