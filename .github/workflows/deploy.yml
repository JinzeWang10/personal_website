name: Deploy to ECS

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.ECS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H 39.102.120.6 >> ~/.ssh/known_hosts

      - name: Deploy via rsync
        run: |
          ssh -i ~/.ssh/id_ed25519 root@39.102.120.6 "mkdir -p /var/www/intro_to_me"
          rsync -avz --delete -e "ssh -i ~/.ssh/id_ed25519" dist/ root@39.102.120.6:/var/www/intro_to_me/

      - name: Reload Nginx
        run: |
          ssh -i ~/.ssh/id_ed25519 root@39.102.120.6 "nginx -t && nginx -s reload"
